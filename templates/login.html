<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOC Login — Secure Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050a0e;
    --panel:    #0a1520;
    --border:   #0d3a52;
    --accent:   #00d4ff;
    --accent2:  #00ff9d;
    --danger:   #ff3b6b;
    --text:     #c8e6f0;
    --muted:    #4a7a8a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridScroll {
    0%   { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 1rem;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 1rem;
    border: 2px solid var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 30px rgba(0,212,255,0.4), inset 0 0 20px rgba(0,212,255,0.05);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 10px rgba(0,212,255,0.05); }
    50%       { box-shadow: 0 0 40px rgba(0,212,255,0.6), inset 0 0 20px rgba(0,212,255,0.1); }
  }

  .logo-title {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 0.25rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow:
      0 0 60px rgba(0,212,255,0.05),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .card-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-header::before { content: '■'; font-size: 0.5rem; }

  .flash-msg {
    background: rgba(255,59,107,0.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    color: var(--danger);
    margin-bottom: 1.5rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .field {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-family: 'Share Tech Mono', monospace;
  }

  input {
    width: 100%;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0,212,255,0.15);
  }

  .btn {
    width: 100%;
    padding: 1rem;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    opacity: 0.08;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover {
    box-shadow: 0 0 25px rgba(0,212,255,0.3);
    color: #fff;
  }

  .hint {
    text-align: center;
    margin-top: 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .hint span { color: var(--accent2); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">🛡</div>
    <div class="logo-title">MINI SOC</div>
    <div class="logo-sub">SECURITY OPERATIONS CENTER — RESTRICTED ACCESS</div>
  </div>

  <div class="card">
    <div class="card-header">AUTHENTICATE OPERATOR</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-msg">⚠ {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>OPERATOR ID</label>
        <input type="text" name="username" autocomplete="username" placeholder="admin" required/>
      </div>
      <div class="field">
        <label>ACCESS CODE</label>
        <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" required/>
      </div>
      <button class="btn" type="submit">[ AUTHENTICATE ]</button>
    </form>

    <div class="hint">DEFAULT: <span>admin</span> / <span>admin123</span></div>
  </div>
</div>
</body>
</html>
